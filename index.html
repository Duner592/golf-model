<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Golf Model Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="menu.css">
    <script src="menu.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 2rem; color: #111; transition: padding-left 0.3s; display: flex; flex-direction: column; }
        .main-content { display: flex; width: 100%; }
        .tour-container { flex: 1; }
        .sidebar { width: 250px; margin-left: 1rem; padding: 0.5rem; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; }
        h1 { text-align: center; color: #333; width: 100%; }
        .tour-section { margin: 2rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; }
        .tour-section h2 { margin-top: 0; color: #007bff; }
        .summary { margin: 0.5rem 0; line-height: 1.5; }
        .link { display: inline-block; margin: 0.25rem 0; padding: 0.25rem 0.5rem; background: #007bff; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9rem; }
        .link:hover { background: #0056b3; }
        .loading { color: #666; font-style: italic; }

        .logo {
            position: absolute;
            top: 8px;
            right: 16px;
            height: 80px;
            width: auto;
            z-index: 1002;
        }

        @media (max-width: 768px) {
            body { padding-top: 70px; }
            .logo { height: 60px; top: 5px; right: 5px; }
            .main-content {
                flex-direction: column;
            }
            .tour-container {
                flex: none;
                width: 100%;
            }
            .sidebar {
                width: 100%;
                margin: 1rem 0;
                padding: 1rem;
            }
            .tour-section {
                padding: 1.5rem;
                margin: 1rem 0;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
<div class="logo-wrapper">
    <img src="EdsGolfModelLogo.png" alt="Eds Golf Model Logo" class="logo">
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<h1>Eds Golf Model Predictions Hub </h1>
<div>Weekly prediction and betting summaries for Majors, PGA Tour and DP World Tour.</div>

<div class="menu-container">
    <button class="hamburger" onclick="toggleMenu()">☰ Menu</button>
</div>

<div class="main-content">
    <div class="tour-container">
        <div class="tour-section" id="pga-section">
            <h2>PGA Tour</h2>
            <div id="pga-summary" class="summary loading">Loading...</div>
            <a href="pga.html" class="link">View PGA Predictions</a>
        </div>

        <div class="tour-section" id="euro-section">
            <h2>DP World Tour</h2>
            <div id="euro-summary" class="summary loading">Loading...</div>
            <a href="euro.html" class="link">View DP World Predictions</a>
        </div>
    </div>

    <div class="sidebar">
        <h3>Upcoming Events 📅</h3>
        <div id="upcoming-events" class="loading">Loading...</div>
    </div>

    <div class="sidebar">
        <h3>Pending Bets 💰</h3>
        <div id="pending-bets" class="loading">Loading...</div>
    </div>
</div>

<div class="menu" id="menu"></div>

<script>
    async function loadSummary(tour) {
        try {
            const meta = await fetch(`${tour}/meta.json`).then(r => r.json());
            const tournament = await fetch(`${tour}/tournament_summary.json`).then(r => r.json()).catch(() => ({}));

            const eventName = meta.event_name || 'Unknown Event';
            const startDate = tournament.start_date || 'TBD';
            const course = tournament.course || 'Unknown Course';
            const fieldSize = tournament.field_size || 'N/A';
            const winners = tournament.previous_winners || [];
            let winnerName = winners.length ? winners[0].winner : '';
            if (winnerName.includes(',')) {
                const parts = winnerName.split(', ');
                if (parts.length === 2) {
                    winnerName = `${parts[1]} ${parts[0]}`;
                }
            }
            const previousWinner = winners.length ? `${winnerName} (${winners[0].score})` : 'N/A';

            return `
                <strong>Event:</strong> ${eventName}<br/>
                <strong>Start Date:</strong> ${startDate}<br/>
                <strong>Course:</strong> ${course}<br/>
                <strong>Field Size:</strong> ${fieldSize}<br/>
                <strong>Previous Winner:</strong> ${previousWinner}
            `;
        } catch (e) {
            return 'Summary unavailable. Please build assets first.';
        }
    }

    async function loadUpcomingEvents() {
        try {
            const pgaSchedule = await fetch('pga/schedule.json').then(r => r.json()).catch(() => []);
            const euroSchedule = await fetch('euro/schedule.json').then(r => r.json()).catch(() => []);

            const allEvents = [...pgaSchedule.map(e => ({ ...e, tour: 'PGA Tour' })), ...euroSchedule.map(e => ({ ...e, tour: 'DP World Tour' }))];
            const now = new Date();
            const fourWeeksLater = new Date(now.getTime() + 28 * 24 * 60 * 60 * 1000);  // 28 days for 4 weeks

            const upcoming = allEvents.filter(e => {
                const eventDate = new Date(e.date.split('-').reverse().join('-'));
                return eventDate >= now && eventDate <= fourWeeksLater;
            }).sort((a, b) => new Date(a.date.split('-').reverse().join('-')) - new Date(b.date.split('-').reverse().join('-')));

            let html = '';
            let currentWeek = null;
            upcoming.forEach(e => {
                const eventDate = new Date(e.date.split('-').reverse().join('-'));
                const week = Math.floor((eventDate - now) / (7 * 24 * 60 * 60 * 1000));
                if (currentWeek !== null && week !== currentWeek) {
                    html += '<br>';
                }
                html += `<strong>${e.tour}:</strong> ${e.date} | ${e.event}<br>`;
                currentWeek = week;
            });
            if (!html) html = 'No upcoming events in the next 4 weeks.';
            return html;
        } catch (e) {
            return 'Upcoming events unavailable.';
        }
    }

    async function loadPendingBets() {
        try {
            const response = await fetch('spreadsheet_data.csv');
            const csvText = await response.text();
            const parsed = Papa.parse(csvText, {
                header: true,
                skipEmptyLines: 'greedy',
                dynamicTyping: false,
                delimiter: ',',
                quoteChar: '"',
                escapeChar: '"',
                newline: '\n',
                transformHeader: header => header.trim()
            });
            console.log('Parsed data sample:', parsed.data.slice(0, 2));  // Temporary: Check column names
            console.log('Headers:', Object.keys(parsed.data[0] || {}));    // Temporary: List headers
            const pendingBets = parsed.data.filter(row => {
                const outcome = (row['Outcome'] || '').toLowerCase().trim();
                return outcome === '' || outcome === 'pending' || outcome === 'Pending';  // Added 'Pending'
            });
            console.log('Filtered pending bets:', pendingBets);  // Temporary: See filtered results
            if (pendingBets.length === 0) {
                return 'No pending bets.';
            }
            let html = '';
            pendingBets.forEach(bet => {
                const tournament = bet['Tournament'] || 'N/A';
                const player = bet['Player'] || 'N/A';
                const type = bet['Type'] || 'N/A';
                const price = bet['Price'] || 'N/A';
                const stake = bet['Stake'] || 'N/A';
                const date = bet['Date'] || 'N/A';
                const placeTerms = bet['Place Terms'] || 'N/A';
                const bookmaker = bet['Bookmaker'] || 'N/A';

                if (tournament === 'N/A' && player === 'N/A' && type === 'N/A' && price === 'N/A' && stake === 'N/A' && date === 'N/A' && placeTerms === 'N/A' && bookmaker === 'N/A') {
                    return;  // Skip this row
                }

                html += `<strong>${tournament}</strong> - ${player} (${type})<br>Price: ${price}<br>Stake: ${stake}<br>Date: ${date}<br>Place terms: ${placeTerms}<br>Bookmaker: ${bookmaker}<br><br>`;
            });
            return html;
        } catch (e) {
            console.error('Error in loadPendingBets:', e);
            return 'Pending bets unavailable.';
        }
    }

    async function loadOverallROI() {
        try {
            const response = await fetch('spreadsheet_data.csv');
            const csvText = await response.text();
            const parsed = Papa.parse(csvText, {
                header: true,
                skipEmptyLines: 'greedy',
                dynamicTyping: false,
                delimiter: ',',
                quoteChar: '"',
                escapeChar: '"',
                newline: '\n',
                transformHeader: header => header.trim()
            });
            let totalReturn = 0;
            let totalStake = 0;
            parsed.data.forEach(row => {
                const returnVal = parseFloat((row['Return'] || '').replace('£', '').replace(',', ''));
                const stakeVal = parseFloat((row['Stake'] || '').replace('£', '').replace(',', ''));
                if (!isNaN(returnVal)) totalReturn += returnVal;
                if (!isNaN(stakeVal)) totalStake += stakeVal;
            });
            const roi = totalStake > 0 ? ((totalReturn - totalStake) / totalStake * 100).toFixed(2) : 0;
            return `<strong>Overall ROI: ${roi}%</strong>`;
        } catch (e) {
            return 'ROI unavailable.';
        }
    }

    async function init() {
        document.getElementById('upcoming-events').innerHTML = await loadUpcomingEvents();
        document.getElementById('pending-bets').innerHTML = await loadPendingBets();
        document.getElementById('pga-summary').innerHTML = await loadSummary('pga');
        document.getElementById('euro-summary').innerHTML = await loadSummary('euro');
    }

    init();

    // Load menu HTML
    fetch('menu.html').then(response => response.text()).then(html => document.getElementById('menu').innerHTML = html);
</script>
</body>
</html>
