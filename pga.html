<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Golf Model — PGA Leaderboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="menu.css">
    <script src="menu.js"></script>
    <!-- Added theme.css for shared styles -->
    <link rel="stylesheet" href="theme.css">
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 100px 1.25rem 1.25rem 1.25rem; color: #111; transition: padding-left 0.3s; }
        h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
        h2 { font-size: 1.2rem; margin: 0 0 0.5rem; color: #666; }
        .muted { color: #555; font-size: 0.95rem; }
        .layout { display: grid; grid-template-columns: 1fr 320px; gap: 1rem; }
        .card { border: 1px solid #e2e2e2; border-radius: 8px; padding: 0.75rem 1rem; background: #fff; }
        table { border-collapse: collapse; width: 100%; background: #fff; table-layout: fixed; }
        th, td { padding: 0.4rem 0.3rem; border-bottom: 1px solid #eee; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        th { cursor: pointer; background: #fafafa; position: sticky; top: 0; z-index: 2; box-shadow: 0 2px 4px rgba(0,0,0,.06); }
        th:nth-child(1), td:nth-child(1) { width: 35px; } /* Rank */
        th:nth-child(2), td:nth-child(2) { width: 100px; } /* Player */
        th:nth-child(3), td:nth-child(3) { width: 65px; } /* Win % */
        th:nth-child(4), td:nth-child(4) { width: 65px; } /* Top-10 % */
        th:nth-child(5), td:nth-child(5) { width: 65px; } /* Make Cut % */
        th:nth-child(6), td:nth-child(6) { width: 70px; } /* Course Fit */
        th:nth-child(7), td:nth-child(7) { width: 75px; } /* R1 Tee */
        th:nth-child(8), td:nth-child(8) { width: 75px; } /* R2 Tee */
        .tooltip {
          position: absolute;
          background: #333;
          color: #fff;
          padding: 5px 8px;
          border-radius: 4px;
          font-size: 12px;
          white-space: normal;
          opacity: 0;
          pointer-events: none;
          transition: opacity 0.3s;
          z-index: 1000;
          max-width: 400px;
          word-wrap: break-word;
        }
        .tooltip.show {
          opacity: 1;
        }
        input[type="search"] { padding: 0.4rem 0.6rem; width: 260px; border: 1px solid #ddd; border-radius: 6px; }
        .num { font-variant-numeric: tabular-nums; }
        .links a { margin-right: 1rem; }
        .small { font-size: 0.9rem; color: #333; }
        .stack { display: flex; flex-direction: column; gap: 0.5rem; }
        .table-container { overflow-x: auto; position: relative; }

        .logo {
            position: absolute;
            top: 8px;
            right: 16px;
            height: 80px;
            width: auto;
            z-index: 1002;
        }

        @media (max-width: 768px) {
            .logo {
                height: 60px;
                top: 5px;
                right: 5px;
            }
        }

        .link { display: inline-block; margin: 0.25rem 0; padding: 0.25rem 0.5rem; background: linear-gradient(135deg, var(--gm-primary-light), var(--gm-primary)); color: white; text-decoration: none; border-radius: 6px; font-size: 0.9rem; box-shadow: 0 8px 18px -14px rgba(29,124,66,0.55); transition: background 0.2s ease, transform 0.2s ease; }
        .link:hover { background: linear-gradient(135deg, var(--gm-primary), var(--gm-primary-dark)); transform: translateY(-1px); }

        @media (max-width: 900px) {
          .layout { grid-template-columns: 1fr; }
          input[type="search"] { width: 100%; }
          table { font-size: 0.9rem; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
<img src="EdsGolfModelLogo.svg" alt="Eds Golf Model Logo" class="logo">
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="menu-container">
    <button class="hamburger" onclick="toggleMenu()">☰ Menu</button>
</div>
<div class="menu" id="menu"></div>

<h1>Eds Golf Model - PGA Predictions Leaderboard</h1>
<h2 id="subtitle"></h2>

<div class="layout">
    <!-- Main column -->
    <div>
        <div class="card" style="display:flex; gap:1rem; flex-wrap:wrap; align-items:center; margin-bottom: 0.5rem;">
            <div class="links small">
                <a id="dlCsv" href="#" download>CSV</a>
                <a id="dlHtml" href="#" download style="display:none;">HTML</a>
            </div>
            <div>
                <label>Event:&nbsp;<select id="eventSelector"></select></label>
            </div>
            <div>
                <label>Filter:&nbsp;<input type="search" id="filterBox" placeholder="Search player" /></label>
            </div>
        </div>

        <div class="table-container">
            <div id="tooltip" class="tooltip"></div>
            <table id="tbl">
                <thead>
                <tr>
                    <th data-key="rank" data-tooltip="Player ranking based on predicted performance">Rank</th>
                    <th data-key="player_name" data-tooltip="Player name">Player</th>
                    <th data-key="p_win_%" data-tooltip="Predicted win percentage based on model simulations">Win %</th>
                    <th data-key="p_top10_%" data-tooltip="Predicted top-10 finish percentage based on model simulations">Top-10 %</th>
                    <th data-key="p_mc_%" data-tooltip="Predicted make cut percentage based on model simulations">Make Cut %</th>
                    <th data-key="course_fit_score" data-tooltip="Course fit score: a model-based metric measuring how well the player's skills match the course characteristics (e.g., par, length, hazards)">Course Fit</th>
                    <th data-key="r1_teetime" data-tooltip="Round 1 tee time; * indicates teeing off from 10th hole">R1 Tee</th>
                    <th data-key="r2_teetime" data-tooltip="Round 2 tee time; * indicates teeing off from 10th hole">R2 Tee</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="stack">
        <div class="card">
            <div><strong>Weather (mph, %)</strong></div>
            <div id="wxList" class="small" style="line-height:1.5;"></div>
        </div>

        <div class="card" id="tournamentCard">
            <div><strong>Tournament</strong></div>
            <div id="tournament" class="small" style="line-height:1.5;"></div>
        </div>

        <div class="card">
            <div><strong>Resources</strong></div>
            <ul id="resources" class="small" style="margin:0.3rem 0 0 1rem;"></ul>
        </div>
    </div>
</div>

<script>
    // Formatting helpers
    const fmtPct = (x) => x != null ? Number(x).toFixed(2) : "";
    const fmtNum = (x, d=2) => x != null ? Number(x).toFixed(d) : "";

    // Helpers to detect 1st/10th tee starts from various possible fields in leaderboard.json
    const is10 = (x) => x === 10 || x === "10" || (typeof x === "string" && /\b10\b/.test(x));
    const is1  = (x) => x === 1  || x === "1"  || (typeof x === "string" && /\b1\b(?!\d)/.test(x));
    const isBackSide = (x) =>
      typeof x === "string" && /^b(ack)?$/i.test(x); // if your data uses "front"/"back"
    const isFrontSide = (x) =>
      typeof x === "string" && /^f(ront)?$/i.test(x);

    // JSON loader
    async function loadJSON(path){
      const r = await fetch(path, {cache: "no-store"});
      if (!r.ok) throw new Error(`${path}: ${r.status}`);
      return r.json();
    }

    // Table rendering

    function renderTable(rows) {
      const tbody = document.querySelector("#tbl tbody");
      tbody.innerHTML = "";
      for (const r of rows) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="num">${r.rank ?? ""}</td>
          <td>${r.player_name ?? ""}</td>
          <td class="num">${fmtPct(r["p_win_%"])}</td>
          <td class="num">${fmtPct(r["p_top10_%"])}</td>
          <td class="num">${fmtPct(r["p_mc_%"])}</td>
          <td class="num">${fmtNum(r.course_fit_score)}</td>
          <td>${r.r1_teetime ?? ""}${r.r1_from_10th ? "<sup>*</sup>" : ""}</td>
          <td>${r.r2_teetime ?? ""}${r.r2_from_10th ? "<sup>*</sup>" : ""}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    function sortRows(rows, key, asc=true) {
      const k = key;
      const f = (v) => (v == null ? "" : v);
      const sorted = [...rows].sort((a,b) => {
        const A = f(a[k]), B = f(b[k]);
        const nA = Number(A), nB = Number(B);
        if (!Number.isNaN(nA) && !Number.isNaN(nB)) {
          return asc ? nA - nB : nB - nA;
        }
        const cmp = String(A).localeCompare(String(B));
        return asc ? cmp : -cmp;
      });
      return sorted;
    }

    function applyFilter(){
      const q = document.getElementById("filterBox").value.trim().toLowerCase();
      let rows = data;
      if (q) rows = data.filter(r => String(r.player_name ?? "").toLowerCase().includes(q));
      rows = sortRows(rows, sortKey, sortAsc);
      renderTable(rows);
    }

    function attachSortHandlers(){
      if (sortHandlersAttached) return;
      const tooltip = document.getElementById("tooltip");

      document.querySelectorAll("#tbl thead th").forEach(th => {
        th.addEventListener("click", () => {
          const key = th.dataset.key;
          if (!key) return;
          if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = true; }
          applyFilter();
        });

        th.addEventListener("mouseover", (e) => {
          const desc = th.getAttribute("data-tooltip");
          if (desc) {
            tooltip.textContent = desc;
            tooltip.classList.add("show");
            tooltip.style.left = e.pageX + "px";
            tooltip.style.top = e.pageY + "px";
          }
        });

        th.addEventListener("mousemove", (e) => {
          if (tooltip.classList.contains("show")) {
            tooltip.style.left = e.pageX + "px";
            tooltip.style.top = e.pageY + "px";
          }
        });

        th.addEventListener("mouseout", () => {
          tooltip.classList.remove("show");
        });
      });

      document.getElementById("filterBox").addEventListener("input", applyFilter);
      sortHandlersAttached = true;
    }

    // Sidebar helpers
    function link(text, href){
      const a = document.createElement("a");
      a.textContent = text; a.href = href; a.target = "_blank"; a.rel = "noopener";
      const el = document.createElement("li"); el.appendChild(a); return el;
    }

    function formatNeutralWeather(r){
      const wind = fmtNum(r.wind_mph, 1);
      const gust = fmtNum(r.gust_mph, 1);
      const rain = fmtNum(r.precip_pct, 0);
      const temp = r.temp_c != null ? fmtNum(r.temp_c, 1) + "°C" : "—";
      let rainEmoji = "🌧️";
      if (r.weathercode !== null && r.weathercode >= 0 && r.weathercode <= 3 && rain === "0") {
        rainEmoji = "☀️";
      }
      let extra = "";
      if (r.weathercode !== null && r.weathercode >= 95 && r.weathercode <= 99) {
        extra = " ⚡ Thunderstorm threat";
      }
      return `🌬️ Wind: ${wind} mph (💨 gust ${gust} mph) • ${rainEmoji} Rain: ${rain}% • 🌡️ Temp: ${temp}${extra}`;
    }

    function formatWaveWeather(part){
      if (!part) return "—";
      const wind = fmtNum(part.wind_mph, 1);
      const rain = fmtNum(part.precip_pct, 0);
      const temp = fmtNum(part.temp_c, 1) + "°C";
      let rainEmoji = "🌧️";
      if (part.weathercode !== null && part.weathercode >= 0 && part.weathercode <= 3 && rain === "0") {
        rainEmoji = "☀️";
      }
      let extra = "";
      if (part.weathercode !== null && part.weathercode >= 95 && part.weathercode <= 99) {
        extra = " ⚡ Thunderstorm threat";
      }
      return `🌬️ Wind: ${wind} mph • ${rainEmoji} Rain: ${rain}% • 🌡️ Temp: ${temp}${extra}`;
    }

    function renderSidebar(eventData){
      // Weather list
      const wxList = document.getElementById("wxList");
      wxList.innerHTML = "";

      const wn = Array.isArray(eventData.weatherNeutral) ? eventData.weatherNeutral : [];
      const ww = Array.isArray(eventData.weatherWave) ? eventData.weatherWave : [];
      const byR = {};
      (ww || []).forEach(x => { (byR[x.round] = byR[x.round] || []).push(x); });

      [1, 2, 3, 4].forEach(rn => {
        const n = wn.find(x => x.round === rn);
        if (n || byR[rn]) {
          const roundDiv = document.createElement("div");
          roundDiv.innerHTML = `<strong>Round ${rn}</strong>`;
          const ul = document.createElement("ul");
          ul.style.margin = "0.25rem 0 0.5rem 1rem";
          ul.style.padding = "0";

          if (n) {
            const li = document.createElement("li");
            li.innerHTML = formatNeutralWeather(n);
            li.style.listStyle = "none";
            ul.appendChild(li);
          }

          if (rn <= 2 && byR[rn]) {
            const am = byR[rn].find(x => x.wave === "AM");
            const pm = byR[rn].find(x => x.wave === "PM");
            if (am || pm) {
              const li = document.createElement("li");
              li.innerHTML = `<em>Wave (AM/PM):</em><br/>AM: ${formatWaveWeather(am)} <br/> PM: ${formatWaveWeather(pm)}`;
              li.style.listStyle = "none";
              li.style.marginTop = "0.25rem";
              ul.appendChild(li);
            }
          }

          roundDiv.appendChild(ul);
          wxList.appendChild(roundDiv);
        }
      });

      // If no weather data at all, show a placeholder
      if (!wn.length && !Object.keys(byR).length) {
        wxList.innerHTML = "<div class='small muted'>No weather data available.</div>";
      }

      // Resources
      const ul = document.getElementById("resources");
      ul.innerHTML = "";
      const res = eventData.resources || {};
      if (res.downloads_csv) ul.appendChild(link("Leaderboard CSV", res.downloads_csv));
      if (res.downloads_html) ul.appendChild(link("Leaderboard HTML", res.downloads_html));
      if (res.weather_meta) ul.appendChild(link("Weather meta (JSON)", res.weather_meta));
      if (eventData.lat != null && eventData.lon != null) {
        ul.appendChild(link("Open course in Maps", `https://www.google.com/maps?q=${eventData.lat},${eventData.lon}`));
      }
      if (res.weather_round_neutral) ul.appendChild(link("Neutral weather (JSON)", res.weather_round_neutral));
      if (res.weather_round_wave) ul.appendChild(link("Wave-aware weather (JSON)", res.weather_round_wave));
      if (res.course_fit_weights) ul.appendChild(link("Course-fit weights (DIY, JSON)", res.course_fit_weights));
      if (res.course_history_summary) ul.appendChild(link("Course-history summary (JSON)", res.course_history_summary));
      if (res.tournament_summary) ul.appendChild(link("Tournament summary (JSON)", res.tournament_summary));
      // Add the schedule link
      ul.appendChild(link("2026 Schedule", "pga_schedule.html"));
    }

    // Tournament summary
    function renderTournament(eventData) {
      const el = document.getElementById("tournament");
      if (!el) return;
      const t = eventData.tournament;
      if (!t) { el.textContent = "No summary."; return; }

    const lines = [];
    if (t.event_name) lines.push(`Event: ${t.event_name}`);
    if (t.course) lines.push(`Course: ${t.course}`);
    if (t.total_yardage != null) lines.push(`Total yardage: ${Number(t.total_yardage).toLocaleString()}`);
    if (t.course_location) lines.push(`Location: ${t.course_location}`);
    if (t.start_date) lines.push(`Start date: ${t.start_date}`);
    if (t.field_size != null) lines.push(`Field size: ${t.field_size}`);

    if (Array.isArray(t.previous_winners) && t.previous_winners.length) {
        const top = t.previous_winners.slice(0, 5);
        const list = top.map(w => {
            let winnerName = w.winner;
            if (winnerName.includes(',')) {
                const parts = winnerName.split(', ');
                if (parts.length === 2) {
                    winnerName = `${parts[1]} ${parts[0]}`;
                }
            }
            return `• ${w.year}: ${winnerName}${w.score ? ` (${w.score})` : ""}`;
        }).join("<br/>");
        lines.push(`<div style="margin-top:0.25rem;"><strong>Previous winners</strong><br/>${list}</div>`);
    }
    el.innerHTML = lines.join("<br/>");
    }

    // Main
    let data = [];
    let sortKey = "rank";
    let sortAsc = true;
    const eventStore = new Map();
    let eventsList = [];
    let tourMeta = null;
    let currentEventId = null;
    let sortHandlersAttached = false;

    async function safeLoadJSON(path){
      if (!path) return null;
      try { return await loadJSON(path); }
      catch (err) {
        console.warn("Failed to load", path, err);
        return null;
      }
    }

    async function loadEventData(eventSummary){
      const id = String(eventSummary.event_id ?? "0");
      if (eventStore.has(id)) return eventStore.get(id);
      const resources = eventSummary.resources || {};
      const [
        meta,
        leaderboard,
        summary,
        weatherNeutral,
        weatherWave,
        tournament,
        courseHistory,
        courseFit,
      ] = await Promise.all([
        resources.meta ? safeLoadJSON(resources.meta) : null,
        resources.leaderboard ? safeLoadJSON(resources.leaderboard) : [],
        resources.summary ? safeLoadJSON(resources.summary) : null,
        resources.weather_round_neutral ? safeLoadJSON(resources.weather_round_neutral) : [],
        resources.weather_round_wave ? safeLoadJSON(resources.weather_round_wave) : [],
        resources.tournament_summary ? safeLoadJSON(resources.tournament_summary) : null,
        resources.course_history_summary ? safeLoadJSON(resources.course_history_summary) : null,
        resources.course_fit_weights ? safeLoadJSON(resources.course_fit_weights) : null,
      ]);
      const fallbackId = String(tourMeta?.event_id ?? "0");
      const effectiveMeta = meta || (fallbackId === id ? tourMeta : null);
      const combinedResources = {
        ...(resources || {}),
        ...((effectiveMeta && effectiveMeta.resources) || {}),
      };
      const eventData = {
        id,
        name: eventSummary.event_name || effectiveMeta?.event_name || `Event ${id}`,
        meta: effectiveMeta,
        summary,
        leaderboard: Array.isArray(leaderboard) ? leaderboard : [],
        weatherNeutral: Array.isArray(weatherNeutral) ? weatherNeutral : [],
        weatherWave: Array.isArray(weatherWave) ? weatherWave : [],
        tournament,
        courseHistory,
        courseFit,
        resources: combinedResources,
        downloadsCsv: combinedResources.downloads_csv || null,
        downloadsHtml: combinedResources.downloads_html || null,
        r1Date: eventSummary.r1_date || effectiveMeta?.r1_date || null,
        lat: effectiveMeta?.lat ?? tourMeta?.lat ?? null,
        lon: effectiveMeta?.lon ?? tourMeta?.lon ?? null,
      };
      eventStore.set(id, eventData);
      return eventData;
    }

    function buildSubtitle(eventData){
      const r1 = eventData.r1Date;
      if (r1 && /^\d{4}-/.test(r1)) {
        const year = r1.split("-")[0];
        return `${year} - ${eventData.name}`;
      }
      return eventData.name;
    }

    function updateDownloads(eventData){
      const dlCsv  = document.getElementById("dlCsv");
      const dlHtml = document.getElementById("dlHtml");
      if (eventData.downloadsCsv){
        dlCsv.href = eventData.downloadsCsv;
        dlCsv.style.display = "inline";
      } else {
        dlCsv.href = "#";
        dlCsv.style.display = "none";
      }
      if (eventData.downloadsHtml){
        dlHtml.href = eventData.downloadsHtml;
        dlHtml.style.display = "inline";
      } else {
        dlHtml.href = "#";
        dlHtml.style.display = "none";
      }
    }

    function populateEventSelector(initialId){
      const selector = document.getElementById("eventSelector");
      if (!selector) return;
      selector.innerHTML = "";
      if (!eventsList.length){
        selector.innerHTML = "<option>No Event</option>";
        selector.disabled = true;
        selector.parentElement.style.display = "none";
        return;
      }
      eventsList.forEach(ev => {
        const option = document.createElement("option");
        option.value = String(ev.event_id);
        option.textContent = ev.event_name || `Event ${ev.event_id}`;
        selector.appendChild(option);
      });
      selector.value = String(initialId ?? eventsList[0].event_id);
      if (eventsList.length <= 1){
        selector.disabled = true;
        selector.parentElement.style.display = "none";
      } else {
        selector.disabled = false;
        selector.parentElement.style.display = "block";
        selector.addEventListener("change", (e) => switchEvent(e.target.value));
      }
    }

    function updateEventUI(eventData){
      const subtitleEl = document.getElementById("subtitle");
      subtitleEl.textContent = buildSubtitle(eventData);
      updateDownloads(eventData);

      const rows = Array.isArray(eventData.leaderboard) ? eventData.leaderboard : [];
      data = rows.map((r, idx) => {
        const r1_is10 = r.r1_from_10th === true ||
                        is10(r.r1_start_hole) || is10(r.r1_start) || is10(r.r1_tee) ||
                        isBackSide(r.r1_side);
        const r1_is1  = r.r1_from_1st === true ||
                        is1(r.r1_start_hole) || is1(r.r1_start) || is1(r.r1_tee) ||
                        isFrontSide(r.r1_side);
        let r1_from_10th = r1_is10 ? true : (r1_is1 ? false : undefined);

        const r2_is10 = r.r2_from_10th === true ||
                        is10(r.r2_start_hole) || is10(r.r2_start) || is10(r.r2_tee) ||
                        isBackSide(r.r2_side);
        const r2_is1  = r.r2_from_1st === true ||
                        is1(r.r2_start_hole) || is1(r.r2_start) || is1(r.r2_tee) ||
                        isFrontSide(r.r2_side);
        let r2_from_10th = r2_is10 ? true : (r2_is1 ? false : undefined);

        if (r1_from_10th === undefined && r2_from_10th !== undefined) {
          r1_from_10th = !r2_from_10th;
        } else if (r2_from_10th === undefined && r1_from_10th !== undefined) {
          r2_from_10th = !r1_from_10th;
        } else if (r1_from_10th !== undefined && r2_from_10th !== undefined && r1_from_10th === r2_from_10th) {
          r1_from_10th = !r2_from_10th;
        }

        r1_from_10th = !!r1_from_10th;
        r2_from_10th = !!r2_from_10th;

        return {
          rank: r.rank ?? (idx + 1),
          player_name: r.player_name ?? r["Player"] ?? "",
          "p_win_%": r["p_win_%"] ?? r.p_win_ ?? "",
          "p_top10_%": r["p_top10_%"] ?? r.p_top10_ ?? "",
          "p_mc_%": r["p_mc_%"] ?? r.p_mc_ ?? "",
          course_fit_score: r.course_fit_score ?? "",
          r1_teetime: r.r1_teetime ?? "",
          r2_teetime: r.r2_teetime ?? "",
          r1_from_10th,
          r2_from_10th,
        };
      });

      applyFilter();
      renderSidebar(eventData);
      renderTournament(eventData);

      const selector = document.getElementById("eventSelector");
      if (selector) selector.value = eventData.id;
    }

    async function switchEvent(eventId){
      if (!eventsList.length){
        renderTable([]);
        renderSidebar({weatherNeutral: [], weatherWave: [], resources: {}});
        renderTournament({tournament: null});
        return;
      }
      currentEventId = String(eventId ?? eventsList[0].event_id);
      const summary = eventsList.find(ev => String(ev.event_id) === currentEventId) || eventsList[0];
      const eventData = await loadEventData(summary);
      updateEventUI(eventData);
    }

    async function main(){
      tourMeta = await loadJSON("pga/meta.json");
      eventsList = Array.isArray(tourMeta.active_events) && tourMeta.active_events.length
        ? tourMeta.active_events.map(ev => ({ ...ev, event_id: String(ev.event_id ?? ev.id ?? ev) }))
        : [{
            event_id: String(tourMeta.event_id ?? "0"),
            event_name: tourMeta.event_name ?? "No Event",
            resources: {
              meta: null,
              leaderboard: tourMeta.resources?.leaderboard ?? "pga/leaderboard.json",
              summary: tourMeta.resources?.summary ?? "pga/summary.json",
              weather_round_neutral: tourMeta.resources?.weather_round_neutral ?? null,
              weather_round_wave: tourMeta.resources?.weather_round_wave ?? null,
              tournament_summary: tourMeta.resources?.tournament_summary ?? null,
              course_history_summary: tourMeta.resources?.course_history_summary ?? null,
              course_fit_weights: tourMeta.resources?.course_fit_weights ?? null,
              downloads_csv: tourMeta.resources?.downloads_csv ?? null,
              downloads_html: tourMeta.resources?.downloads_html ?? null,
              schedule: tourMeta.resources?.schedule ?? "pga/schedule.json",
            },
            r1_date: tourMeta.r1_date ?? null,
          }];
      const initialId = eventsList.length ? String(eventsList[0].event_id) : null;
      populateEventSelector(initialId);
      attachSortHandlers();
      await switchEvent(initialId);
    }

    // Kick off
    main().catch(err => {
      document.body.innerHTML = `<pre style="color:#b00">${err}</pre>`;
      console.error(err);
    });

    // Load menu HTML
    fetch('menu.html').then(response => response.text()).then(html => document.getElementById('menu').innerHTML = html);
</script>
</body>
</html>
