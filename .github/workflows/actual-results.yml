name: Fetch actual results

on:
  schedule:
    # Runs once a day at 02:17 UTC.
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Season/archive year to refresh. Defaults to the current UTC year."
        type: string
        required: false

permissions:
  contents: write

concurrency:
  group: actual-results
  cancel-in-progress: false

jobs:
  fetch-actual-results:
    runs-on: ubuntu-latest
    env:
      DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
      YEAR: ${{ inputs.year || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Fetch actual results
        run: bash scripts/ci_fetch_actual_results.sh

      - name: Commit actual result updates
        run: |
          if git diff --quiet -- upcoming-events.json web/archive data/analytics; then
            echo "No actual-result changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upcoming-events.json web/archive data/analytics
          git commit -m "Update actual results"
          git pull --rebase --autostash origin master
          git push
