<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Event Archive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="menu.css">
    <script src="menu.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 100px 1.25rem 1.25rem 1.25rem; color: #111; }
        h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
        h2 { font-size: 1.2rem; margin: 1rem 0 0.5rem; }
        table { border-collapse: collapse; width: 100%; background: #fff; table-layout: fixed; margin-bottom: 2rem; }
        th, td { padding: 0.4rem 0.3rem; border-bottom: 1px solid #eee; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        th { background: #fafafa; cursor: pointer; }
        th:nth-child(1), td:nth-child(1) { width: 50px; }
        th:nth-child(2), td:nth-child(2) { width: 150px; }
        th:nth-child(3), td:nth-child(3) { width: 80px; }
        th:nth-child(4), td:nth-child(4) { width: 80px; }
        th:nth-child(5), td:nth-child(5) { width: 80px; }
        th:nth-child(6), td:nth-child(6) { width: 80px; }
        .num { font-variant-numeric: tabular-nums; }
        .charts { display: flex; flex-wrap: wrap; gap: 1rem; }
        .chart-container { flex: 1 1 300px; max-width: 400px; }
        canvas { max-width: 100%; height: 300px; }
        .logo {
            position: absolute;
            top: 8px;
            right: 16px;
            height: 80px;
            width: auto;
            z-index: 1002;
        }
        @media (max-width: 768px) {
            .logo { height: 60px; top: 5px; right: 5px; }
            .charts { flex-direction: column; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
<img src="EdsGolfModelLogo.svg" alt="Eds Golf Model Logo" class="logo">
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="menu-container">
    <button class="hamburger" onclick="toggleMenu()">☰ Menu</button>
</div>
<div class="menu" id="menu"></div>

<p><a href="archive.html">← Back to Archive</a></p>
<h1 id="eventTitle">Event Predictions</h1>
<table>
    <thead>
    <tr>
        <th onclick="sortTable(0)">Rank</th>
        <th onclick="sortTable(1)">Player</th>
        <th onclick="sortTable(2)">Win %</th>
        <th onclick="sortTable(3)">Top-10 %</th>
        <th onclick="sortTable(4)">Make Cut %</th>
        <th onclick="sortTable(5)">Course Fit</th>
    </tr>
    </thead>
    <tbody id="eventTableBody"></tbody>
</table>

<h2>Predictions vs. Actual Results</h2>
<div class="charts">
    <div class="chart-container">
        <canvas id="winChart"></canvas>
    </div>
    <div class="chart-container">
        <canvas id="top10Chart"></canvas>
    </div>
    <div class="chart-container">
        <canvas id="mcChart"></canvas>
    </div>
</div>

<script>
    // Formatting helpers
    const fmtPct = (x) => x != null ? Number(x).toFixed(2) : "";
    const fmtNum = (x, d=2) => x != null ? Number(x).toFixed(d) : "";

    // JSON loader
    async function loadJSON(path) {
        const r = await fetch(path, { cache: "no-store" });
        if (!r.ok) throw new Error(`${path}: ${r.status}`);
        return r.json();
    }

    // Get URL parameters
    const params = new URLSearchParams(window.location.search);
    const year = params.get('year');
    const slug = params.get('slug');
    const eventName = params.get('event');
    const tour = params.get('tour');

    let data = [];
    let sortDirection = Array(6).fill(true); // true = asc
    let winner = null;

    // Sort table by column
    function sortTable(col) {
        data.sort((a, b) => {
            let aVal = Object.values(a)[col];
            let bVal = Object.values(b)[col];
            // Convert to number if possible
            if (!isNaN(aVal)) aVal = Number(aVal);
            if (!isNaN(bVal)) bVal = Number(bVal);
            if (aVal < bVal) return sortDirection[col] ? -1 : 1;
            if (aVal > bVal) return sortDirection[col] ? 1 : -1;
            return 0;
        });
        sortDirection[col] = !sortDirection[col];
        renderTable();
    }

    // Render the table
    function renderTable() {
        const tbody = document.getElementById("eventTableBody");
        tbody.innerHTML = data.map(r => `
            <tr>
                <td class="num">${r.rank}</td>
                <td>${r.player_name}</td>
                <td class="num">${fmtPct(r["p_win_%"])}</td>
                <td class="num">${fmtPct(r["p_top10_%"])}</td>
                <td class="num">${fmtPct(r["p_mc_%"])}</td>
                <td class="num">${fmtNum(r.course_fit_score)}</td>
            </tr>
        `).join('');
    }

    // Load event data and create charts
    async function loadEventData() {
        try {
            document.getElementById('eventTitle').textContent = `${eventName} Predictions`;

            // Load summary for winner
            let summary = {};
            try {
                if (year === "current") {
                    summary = await loadJSON(`${tour}/tournament_summary.json`);
                } else {
                    summary = await loadJSON(`archive/${year}/${slug}/tournament_summary.json`);
                }
                winner = summary.winner;
            } catch (e) {
                console.warn('Summary not found, winner not available');
            }

            // Load leaderboard data
            if (year === "current") {
                data = await loadJSON(`${tour}/leaderboard.json`);
            } else {
                try {
                    data = await loadJSON(`archive/${year}/${slug}/leaderboard.json`);
                } catch (e) {
                    // Fallback to CSV
                    const csvResponse = await fetch(`archive/${year}/${slug}/leaderboard.csv`);
                    if (!csvResponse.ok) throw new Error("Data not found");
                    const csvText = await csvResponse.text();
                    const results = Papa.parse(csvText, { header: true, dynamicTyping: true });
                    if (results.errors.length) throw new Error("CSV parse error");
                    data = results.data;
                }
            }

            // Process data
            data = data.map((r, idx) => ({
                rank: r.rank ?? (idx + 1),
                player_name: r.player_name ?? r["Player"] ?? "",
                "p_win_%": r["p_win_%"] ?? r.p_win_ ?? "",
                "p_top10_%": r["p_top10_%"] ?? r.p_top10_ ?? "",
                "p_mc_%": r["p_mc_%"] ?? r.p_mc_ ?? "",
                course_fit_score: r.course_fit_score ?? "",
                actual_rank: r.actual_rank ?? null, // Add this field if available in your data
            }));

            // Initial render
            renderTable();

            // Create charts
            createCharts();
        } catch (e) {
            document.body.innerHTML = `<pre style="color:#b00">Error: ${e.message}</pre>`;
            console.error(e);
        }
    }

    // Create scatter plots
    function createCharts() {
        // Win Chart
        const winData = data.map(d => ({
            x: d["p_win_%"] || 0,
            y: (d.player_name === winner) ? 1 : 0
        }));
        new Chart(document.getElementById('winChart'), {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'Win Prediction vs Actual',
                    data: winData,
                    backgroundColor: 'rgba(75, 192, 192, 0.6)',
                }]
            },
            options: {
                scales: {
                    x: { title: { display: true, text: 'Predicted Win %' } },
                    y: { title: { display: true, text: 'Actual Win (0/1)' }, ticks: { stepSize: 1 } }
                }
            }
        });

        // Top 10 Chart
        const top10Data = data.filter(d => d.actual_rank != null).map(d => ({
            x: d["p_top10_%"] || 0,
            y: (d.actual_rank <= 10) ? 1 : 0
        }));
        new Chart(document.getElementById('top10Chart'), {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'Top-10 Prediction vs Actual',
                    data: top10Data,
                    backgroundColor: 'rgba(255, 99, 132, 0.6)',
                }]
            },
            options: {
                scales: {
                    x: { title: { display: true, text: 'Predicted Top-10 %' } },
                    y: { title: { display: true, text: 'Actual Top-10 (0/1)' }, ticks: { stepSize: 1 } }
                }
            }
        });

        // Make Cut Chart
        const mcData = data.filter(d => d.actual_rank != null).map(d => ({
            x: d["p_mc_%"] || 0,
            y: (d.actual_rank > 0) ? 1 : 0  // Assuming actual_rank > 0 means made cut
        }));
        new Chart(document.getElementById('mcChart'), {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'Make Cut Prediction vs Actual',
                    data: mcData,
                    backgroundColor: 'rgba(54, 162, 235, 0.6)',
                }]
            },
            options: {
                scales: {
                    x: { title: { display: true, text: 'Predicted Make Cut %' } },
                    y: { title: { display: true, text: 'Actual Make Cut (0/1)' }, ticks: { stepSize: 1 } }
                }
            }
        });
    }

    // Load menu HTML
    fetch('menu.html').then(response => response.text()).then(html => document.getElementById('menu').innerHTML = html);

    // Kick off
    loadEventData().catch(err => {
        document.body.innerHTML = `<pre style="color:#b00">${err}</pre>`;
        console.error(err);
    });
</script>
</body>
</html>
