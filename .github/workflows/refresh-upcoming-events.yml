name: Refresh upcoming events

on:
  schedule:
    # Runs hourly at minute 7 UTC, before the model refresh jobs at minute 23.
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      season:
        description: "Season/year to refresh. Defaults to the current UTC year."
        type: string
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
      SEASON: ${{ inputs.season || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Refresh upcoming-events.json
        run: |
          args=()
          if [ -n "$SEASON" ]; then
            args+=(--season "$SEASON")
          fi
          python scripts/update_upcoming_events.py "${args[@]}"
          python scripts/update_web_status.py --schedule-refreshed --sync-assets --workflow "refresh-upcoming-events"

      - name: Commit refreshed schedule
        run: |
          if git diff --quiet -- upcoming-events.json; then
            echo "upcoming-events.json is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upcoming-events.json
          git commit -m "Refresh upcoming events schedule [skip ci]"
          git pull --rebase origin master
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload web artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
