<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2026 PGA Tour Schedule</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="menu.css">
    <script src="menu.js"></script>
    <style>
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            margin: 2rem;
            color: #111;
            transition: padding-left 0.3s;
            display: flex;
            flex-direction: column;
        }

        /* Logo (same as index) */
        .logo {
            position: absolute;
            top: 8px;
            right: 16px;
            height: 80px;
            width: auto;
            z-index: 1002;
        }

        /* Table area */
        .table-container { overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; width: auto; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; white-space: nowrap; }
        th { background-color: #f2f2f2; }

        /* Majors highlight */
        .majors { background-color: lightgreen; }

        /* Signature Events highlight */
        .signature-events { background-color: lightblue; }

        /* FedEx Playoffs highlight */
        .fedex-playoffs { background-color: #d8bfd8; }  /* Light purple */

        /* Key for events */
        .event-key { margin: 1rem 0; font-size: 0.9rem; font-style: italic; color: #555; }

        /* Link button (same as index) */
        .link { display: inline-block; margin: 0.25rem 0; padding: 0.25rem 0.5rem; background: linear-gradient(135deg, var(--gm-primary-light), var(--gm-primary)); color: white; text-decoration: none; border-radius: 6px; font-size: 0.9rem; box-shadow: 0 8px 18px -14px rgba(29,124,66,0.55); transition: background 0.2s ease, transform 0.2s ease; }
        .link:hover { background: linear-gradient(135deg, var(--gm-primary), var(--gm-primary-dark)); transform: translateY(-1px); }

        @media (max-width: 768px) {
            body { padding-top: 70px; }
            .logo { height: 60px; top: 5px; right: 5px; }

            /* Column min-widths + wrap for Event and Course so they're not tiny, but can wrap */
            th:nth-child(1), td:nth-child(1) { min-width: 100px; }   /* Date */
            th:nth-child(2), td:nth-child(2) {                       /* Event */
                min-width: 210px;
                white-space: normal;
                overflow-wrap: anywhere;
                word-break: break-word;
                line-height: 1.3;
            }
            th:nth-child(3), td:nth-child(3) {                       /* Course */
                min-width: 170px;
                white-space: normal;
                overflow-wrap: anywhere;
                word-break: break-word;
                line-height: 1.3;
            }
            th:nth-child(4), td:nth-child(4) { min-width: 220px; }   /* Location */
            th:nth-child(5), td:nth-child(5) { min-width: 150px; }   /* Winner */
        }
    </style>
</head>
<body>
<div class="logo-wrapper">
    <img src="EdsGolfModelLogo.svg" alt="Eds Golf Model Logo" class="logo">
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- Same placement as index.html -->
<div class="menu-container"></div>

<h1>2026 PGA Tour Schedule</h1>

<!-- Key for events -->
<div class="event-key">Note: Rows highlighted in green are Majors. Rows highlighted in blue are Signature events. Rows highlighted in purple are FedEx Playoff events.</div>

<div class="table-container">
    <table id="schedule-table">
        <thead>
        <tr>
            <th>Date</th>
            <th>Event</th>
            <th>Course</th>
            <th>Location</th>
            <th>Winner</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="menu" id="menu"></div>

<script>
    // Data load
    const tbody = document.querySelector('#schedule-table tbody');
    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Loading schedule...</td></tr>';

    fetch('pga/schedule.json')
        .then(response => {
            if (!response.ok) throw new Error('Failed to load schedule data');
            return response.json();
        })
        .then(data => {
            tbody.innerHTML = '';
            if (!data || !data.length) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No events found.</td></tr>';
                return;
            }
            const signatureEvents = [
                'AT&T Pebble Beach Pro-Am',
                'The Genesis Invitational',
                'Arnold Palmer Invitational presented by Mastercard',
                'RBC Heritage',
                'Miami Championship',
                'Truist Championship',
                'the Memorial Tournament presented by Workday',
                'Travelers Championship'
            ];
            const majorEvents = [
                'Masters Tournament',
                'PGA Championship',
                'U.S. Open',
                'The Open Championship'
            ];
            const fedexEvents = [
                'FedEx St. Jude Championship',
                'BMW Championship',
                'TOUR Championship'
            ];
            data.forEach(event => {
                const row = document.createElement('tr');
                const isSignature = signatureEvents.includes(event.event);
                const isMajor = majorEvents.includes(event.event);
                const isFedex = fedexEvents.includes(event.event);
                if (isSignature) row.classList.add('signature-events');
                if (isMajor) row.classList.add('majors');
                if (isFedex) row.classList.add('fedex-playoffs');
                row.innerHTML = `<td>${event.date || 'N/A'}</td><td>${event.event || 'N/A'}</td><td>${event.course || 'N/A'}</td><td>${event.location || 'N/A'}</td><td>${event.winner || 'N/A'}</td>`;
                tbody.appendChild(row);
            });
        })
        .catch(() => {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Error loading schedule. Please try again later.</td></tr>';
        });

    // Load menu HTML
    fetch('menu.html?v=20260417').then(response => response.text()).then(html => document.getElementById('menu').innerHTML = html);
</script>
</body>
</html>
