name: Deploy static web

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - "scripts/update_web_status.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Refresh model assets
        run: bash scripts/ci_run_model.sh

      - name: Commit durable prediction snapshots
        run: |
          snapshot_paths=(web/archive web/pga/initial web/euro/initial)

          existing_paths=()
          for path in "${snapshot_paths[@]}"; do
            if [ -e "$path" ]; then
              existing_paths+=("$path")
            fi
          done

          if [ "${#existing_paths[@]}" -eq 0 ]; then
            echo "No durable snapshot paths exist."
            exit 0
          fi

          changes="$(git status --porcelain --untracked-files=all -- "${existing_paths[@]}")"
          if [ -z "$changes" ]; then
            echo "No durable prediction snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${existing_paths[@]}"
          git commit -m "Persist deployed prediction snapshots [skip ci]"
          git pull --rebase --autostash origin master
          git push

      - name: Update site status
        run: python3 scripts/update_web_status.py --sync-assets --workflow "deploy-pages"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload web artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
