<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Eds Golf Model - Course Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="menu.css">
    <script src="menu.js"></script>
    <!-- Added theme.css for shared styles -->
    <link rel="stylesheet" href="theme.css">
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 100px 1.25rem 1.25rem 1.25rem; color: #111; transition: padding-left 0.3s; }
        h1 { text-align: center; color: #2e8b57; }
        .filter-section { margin: 2rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; }
        .filter-section select, .filter-section button { margin: 0.5rem; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
        .filter-section button { background: linear-gradient(135deg, var(--gm-primary-light), var(--gm-primary)); color: white; cursor: pointer; border: none; box-shadow: 0 8px 18px -14px rgba(29,124,66,0.55); transition: background 0.2s ease, transform 0.2s ease; }
        .filter-section button:hover { background: linear-gradient(135deg, var(--gm-primary), var(--gm-primary-dark)); transform: translateY(-1px); }
        .results { margin: 2rem 0; }
        .course-card { margin: 1.5rem 0; padding: 1.5rem; border: 1px solid #d9d9d9; border-radius: 12px; background: #fff; box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06); }
        .course-card h3 { margin: 0; font-size: 1.35rem; color: #235e3d; }
        .course-card p { margin: 0.5rem 0 0; color: #3a3a3a; }
        .course-card p strong { color: #2e8b57; }
        .course-detail-block { margin-top: 1rem; padding: 0.85rem 1rem; border: 1px solid #ececec; border-radius: 10px; background: linear-gradient(180deg, rgba(242, 249, 245, 0.6), rgba(255, 255, 255, 0.9)); line-height: 1.55; font-size: 0.98rem; color: #232323; }
        .course-detail-block.empty { background: #f9f9f9; color: #666; font-style: italic; }
        .loading { color: #666; font-style: italic; }
        .error { color: #d9534f; font-weight: bold; }
        .no-results { color: #666; font-style: italic; }

        .logo {
            position: absolute;
            top: 8px;
            right: 16px;
            height: 80px;
            width: auto;
            z-index: 1002;
        }

        @media (max-width: 768px) {
            .logo {
                height: 60px;
                top: 5px;
                right: 5px;
            }
        }

        .link { display: inline-block; margin: 0.25rem 0; padding: 0.25rem 0.5rem; background: linear-gradient(135deg, var(--gm-primary-light), var(--gm-primary)); color: white; text-decoration: none; border-radius: 6px; font-size: 0.9rem; box-shadow: 0 8px 18px -14px rgba(29,124,66,0.55); transition: background 0.2s ease, transform 0.2s ease; }
        .link:hover { background: linear-gradient(135deg, var(--gm-primary), var(--gm-primary-dark)); transform: translateY(-1px); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="assets/js/betting-data.js"></script>
</head>
<body>
<img src="EdsGolfModelLogo.svg" alt="Eds Golf Model Logo" class="logo">
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="menu-container"></div>
<div class="menu" id="menu"></div>

<h1>Eds Golf Model - Course Details</h1>
<p>Filter by tournament and/or course name to view details from betting history data.</p>

<div class="filter-section">
    <label for="tournament-filter">Tournament:</label>
    <select id="tournament-filter">
        <option value="">All Tournaments</option>
    </select>

    <label for="course-filter">Course Name:</label>
    <select id="course-filter">
        <option value="">All Courses</option>
    </select>

    <button id="filter-btn">Apply Filter</button>
</div>

<div id="course-details" class="loading">Loading data...</div>

<script>
    let csvData = [];  // Store parsed CSV data globally for filtering

    async function loadOverallROI() {
        try {
            const data = await BettingData.load();
            let totalReturn = 0;
            let totalStake = 0;
            data.forEach(row => {
                const returnVal = parseFloat((row['Return'] || '').replace('£', '').replace(',', ''));
                const stakeVal = parseFloat((row['Stake'] || '').replace('£', '').replace(',', ''));
                if (!isNaN(returnVal)) totalReturn += returnVal;
                if (!isNaN(stakeVal)) totalStake += stakeVal;
            });
            const roi = totalStake > 0 ? ((totalReturn - totalStake) / totalStake * 100).toFixed(2) : 0;
            return `<strong>Overall ROI: ${roi}%</strong>`;
        } catch (e) {
            return 'ROI unavailable.';
        }
    }

    async function loadData() {
        try {
            csvData = await BettingData.load();

            // Populate dropdowns with unique values
            const tournaments = new Set();
            const courses = new Set();  // Using "Course" field for course names
            csvData.forEach(row => {
                const tournament = row['Tournament'] || row['Tour/Majors'] || '';
                const course = (row['Course'] || '').trim();
                if (tournament) tournaments.add(tournament);
                if (course && course.toLowerCase() !== 'n/a') courses.add(course);
            });

            const tournamentSelect = document.getElementById('tournament-filter');
            Array.from(tournaments).sort().forEach(t => {
                const option = document.createElement('option');
                option.value = t;
                option.textContent = t;
                tournamentSelect.appendChild(option);
            });

            const courseSelect = document.getElementById('course-filter');
            Array.from(courses).sort().forEach(c => {
                const option = document.createElement('option');
                option.value = c;
                option.textContent = c;
                courseSelect.appendChild(option);
            });

            // Initial display (show all)
            displayResults(csvData);
        } catch (e) {
            console.error('Error loading data:', e);
            document.getElementById('course-details').innerHTML = '<div class="error">Data unavailable. Check console for errors.</div>';
        }
    }

    function escapeHtml(value) {
        if (value == null) return '';
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function displayResults(filteredData) {
        const resultsDiv = document.getElementById('course-details');

        // Collect unique courses with their details (removes duplicates)
        const uniqueCourses = new Map();  // Key: course name, Value: { detail, tournament }
        filteredData.forEach(row => {
            const courseName = (row['Course'] || '').trim();
            const courseDetailRaw = (row['Course Details'] || '').trim();
            const tournament = row['Tournament'] || row['Tour/Majors'] || '';

            if (courseName && courseName.toLowerCase() !== 'n/a' && courseDetailRaw && !uniqueCourses.has(courseName)) {
                uniqueCourses.set(courseName, { detail: courseDetailRaw, tournament: tournament });
            }
        });

        if (uniqueCourses.size === 0) {
            resultsDiv.innerHTML = '<div class="no-results">No matching course details found.</div>';
            return;
        }

        let html = '<div class="results">';
        uniqueCourses.forEach((data, courseName) => {
            const safeCourseName = escapeHtml(courseName || 'Course');
            const safeTournament = data.tournament ? escapeHtml(data.tournament) : '';
            const rawDetail = typeof data.detail === 'string' ? data.detail : '';
            const hasDetail = rawDetail.trim().length > 0;
            const detailHtml = hasDetail
                ? escapeHtml(rawDetail).replace(/\r?\n/g, '<br>')
                : 'Course details unavailable.';
            const detailClass = hasDetail ? 'course-detail-block' : 'course-detail-block empty';

            let courseHtml = `<div class="course-card"><h3>${safeCourseName}</h3>`;
            if (safeTournament) {
                courseHtml += `<p><strong>Tournament:</strong> ${safeTournament}</p>`;
            }
            courseHtml += `<div class="${detailClass}">${detailHtml}</div></div>`;
            html += courseHtml;
        });
        html += '</div>';
        resultsDiv.innerHTML = html;
    }

    function applyFilter() {
        const selectedTournament = document.getElementById('tournament-filter').value;
        const selectedCourse = document.getElementById('course-filter').value;

        const filtered = csvData.filter(row => {
            const tournamentMatch = !selectedTournament || (row['Tournament'] || row['Tour/Majors'] || '') === selectedTournament;
            const courseMatch = !selectedCourse || (row['Course'] || '').trim() === selectedCourse;
            return tournamentMatch && courseMatch;
        });

        displayResults(filtered);
    }

    async function init() {
        await loadData();
        document.getElementById('filter-btn').addEventListener('click', applyFilter);
    }

    init();

    // Load menu HTML
    fetch('menu.html?v=20260417').then(response => response.text()).then(html => document.getElementById('menu').innerHTML = html);
</script>

</body>
</html>
