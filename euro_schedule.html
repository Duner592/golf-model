<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2025 DP World Tour Schedule</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
<h1>2025 DP World Tour Schedule</h1>
<table id="schedule-table">
    <thead>
    <tr>
        <th>Date</th>
        <th>Event</th>
        <th>Course</th>
        <th>Location</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>
<script>
    fetch('euro/schedule.json')
        .then(response => response.json())
        .then(data => {
            const tbody = document.querySelector('#schedule-table tbody');
            data.forEach(event => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${event.date}</td><td>${event.event}</td><td>${event.course}</td><td>${event.location}</td>`;
                tbody.appendChild(row);
            });
        })
        .catch(error => console.error('Error loading schedule:', error));
</script>
<br><a href="euro.html">Back to Euro Predictions</a>
</body>
</html>
