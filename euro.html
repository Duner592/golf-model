<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Golf Model — Euro Leaderboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="menu.css">
    <script src="menu.js"></script>
    <!-- Added theme.css for shared styles -->
    <link rel="stylesheet" href="theme.css">
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 100px 1.25rem 1.25rem 1.25rem; color: #111; transition: padding-left 0.3s; }
        h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
        h2 { font-size: 1.2rem; margin: 0 0 0.5rem; color: #666; }
        .muted { color: #555; font-size: 0.95rem; }
        .layout { display: grid; grid-template-columns: 1fr 320px; gap: 1rem; }
        .card { border: 1px solid #e2e2e2; border-radius: 8px; padding: 0.75rem 1rem; background: #fff; }
        table { border-collapse: collapse; width: 100%; background: #fff; table-layout: fixed; }
        th, td { padding: 0.4rem 0.3rem; border-bottom: 1px solid #eee; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        th { cursor: pointer; background: #fafafa; position: sticky; top: 0; z-index: 2; box-shadow: 0 2px 4px rgba(0,0,0,.06); }
        th:nth-child(1), td:nth-child(1) { width: 35px; } /* Rank */
        th:nth-child(2), td:nth-child(2) { width: 100px; } /* Player */
        th:nth-child(3), td:nth-child(3) { width: 65px; } /* Win % */
        th:nth-child(4), td:nth-child(4) { width: 65px; } /* Top-10 % */
        th:nth-child(5), td:nth-child(5) { width: 65px; } /* Make Cut % */
        th:nth-child(6), td:nth-child(6) { width: 70px; } /* Course Fit */
        th:nth-child(7), td:nth-child(7) { width: 75px; } /* R1 Tee */
        th:nth-child(8), td:nth-child(8) { width: 75px; } /* R2 Tee */
        .tooltip {
          position: absolute;
          background: #333;
          color: #fff;
          padding: 5px 8px;
          border-radius: 4px;
          font-size: 12px;
          white-space: normal;
          opacity: 0;
          pointer-events: none;
          transition: opacity 0.3s;
          z-index: 1000;
          max-width: 400px;
          word-wrap: break-word;
        }
        .tooltip.show {
          opacity: 1;
        }
        input[type="search"] { padding: 0.4rem 0.6rem; width: 260px; border: 1px solid #ddd; border-radius: 6px; }
        .num { font-variant-numeric: tabular-nums; }
        .links a { margin-right: 1rem; }
        .small { font-size: 0.9rem; color: #333; }
        .stack { display: flex; flex-direction: column; gap: 0.5rem; }
        .table-container { overflow-x: auto; position: relative; }

        .logo {
            position: absolute;
            top: 8px;
            right: 16px;
            height: 80px;
            width: auto;
            z-index: 1002;
        }

        @media (max-width: 768px) {
            .logo {
                height: 60px;
                top: 5px;
                right: 5px;
            }
        }

        .link { display: inline-block; margin: 0.25rem 0; padding: 0.25rem 0.5rem; background: linear-gradient(135deg, var(--gm-primary-light), var(--gm-primary)); color: white; text-decoration: none; border-radius: 6px; font-size: 0.9rem; box-shadow: 0 8px 18px -14px rgba(29,124,66,0.55); transition: background 0.2s ease, transform 0.2s ease; }
        .link:hover { background: linear-gradient(135deg, var(--gm-primary), var(--gm-primary-dark)); transform: translateY(-1px); }

        .weather-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 0.75rem; margin-top: 0.5rem; }
        .weather-card { border: 1px solid #dbe7dc; border-radius: 12px; padding: 0.8rem 0.9rem; background: linear-gradient(160deg, rgba(255,255,255,0.95), rgba(236,246,239,0.9)); box-shadow: 0 18px 32px -25px rgba(29,124,66,0.45); display: flex; flex-direction: column; gap: 0.65rem; }
        .weather-card__header { display: flex; flex-direction: column; gap: 0.35rem; }
        .weather-card__title { font-size: 0.95rem; font-weight: 700; letter-spacing: 0.02em; text-transform: uppercase; color: #1d7c42; }
        .weather-card__summary { display: flex; flex-wrap: wrap; gap: 0.35rem; }
        .weather-pill { display: inline-flex; align-items: center; gap: 0.3rem; border-radius: 999px; padding: 0.3rem 0.65rem; font-size: 0.8rem; font-weight: 600; background: rgba(58, 84, 70, 0.12); color: #2f3d36; }
        .weather-pill__icon { font-size: 1rem; line-height: 1; }
        .weather-card__body { display: flex; flex-direction: column; gap: 0.65rem; }
        .weather-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .weather-group__title { font-size: 0.78rem; letter-spacing: 0.05em; text-transform: uppercase; color: #557960; font-weight: 700; }
        .weather-stats { display: flex; flex-direction: column; gap: 0.35rem; padding: 0.45rem 0.6rem; border: 1px solid rgba(125, 152, 129, 0.18); border-radius: 8px; background: rgba(255,255,255,0.7); }
        .weather-stat { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; font-size: 0.88rem; }
        .weather-stat__icon { font-size: 1rem; }
        .weather-stat__label { flex: 1; color: #3f4a45; font-weight: 500; }
        .weather-stat__value { font-variant-numeric: tabular-nums; font-weight: 600; color: #243c2f; }
        .weather-wave-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.55rem; }
        .weather-wave { border: 1px solid rgba(125, 152, 129, 0.18); border-radius: 8px; padding: 0.6rem 0.65rem; background: rgba(247, 252, 247, 0.9); display: flex; flex-direction: column; gap: 0.35rem; }
        .weather-wave__label { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #1f6d3d; }
        .weather-notes { margin: 0; padding-left: 1rem; display: flex; flex-direction: column; gap: 0.35rem; font-size: 0.83rem; color: #2f4036; }
        .weather-notes li { list-style: disc; }
        .weather-muted { color: #6a776f; font-size: 0.82rem; }
        .weather-alert-banner { display: flex; gap: 0.45rem; align-items: flex-start; border-radius: 8px; padding: 0.55rem 0.65rem; background: rgba(239, 84, 62, 0.12); border: 1px solid rgba(239, 84, 62, 0.32); color: #933026; font-size: 0.84rem; font-weight: 600; }
        .weather-alert-banner__icon { font-size: 1.1rem; line-height: 1; }
        .weather-pill.weather-severity--calm { background: rgba(29,124,66,0.08); color: #1d7c42; }
        .weather-pill.weather-severity--warn { background: rgba(255, 196, 38, 0.18); color: #8a6100; }
        .weather-pill.weather-severity--alert { background: rgba(239, 84, 62, 0.16); color: #9b2e24; }
        .weather-stat.weather-severity--calm .weather-stat__value { color: #1d7c42; }
        .weather-stat.weather-severity--warn .weather-stat__value { color: #8a6100; }
        .weather-stat.weather-severity--alert .weather-stat__value { color: #9b2e24; }

        @media (max-width: 900px) {
          .layout { grid-template-columns: 1fr; }
          input[type="search"] { width: 100%; }
          table { font-size: 0.9rem; }
          .weather-grid { grid-template-columns: 1fr; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
<img src="EdsGolfModelLogo.svg" alt="Eds Golf Model Logo" class="logo">
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="menu-container"></div>
<div class="menu" id="menu"></div>

<h1>Eds Golf Model - Euro Predictions Leaderboard</h1>
<h2 id="subtitle"></h2>
<p id="generatedAt" class="muted" style="margin:0 0 0.75rem; display:none;"></p>

<div class="layout">
    <!-- Main column -->
    <div>
        <div class="card" style="display:flex; gap:1rem; flex-wrap:wrap; align-items:center; margin-bottom: 0.5rem;">
            <div class="links small">
                <a id="dlCsv" href="#" download>CSV</a>
                <a id="dlHtml" href="#" download style="display:none;">HTML</a>
            </div>
            <div>
                <label>Filter:&nbsp;<input type="search" id="filterBox" placeholder="Search player" /></label>
            </div>
        </div>

        <div class="table-container">
            <div id="tooltip" class="tooltip"></div>
            <table id="tbl">
                <thead>
                <tr>
                    <th data-key="rank" data-tooltip="Player ranking based on predicted performance">Rank</th>
                    <th data-key="player_name" data-tooltip="Player name">Player</th>
                    <th data-key="p_win_%" data-tooltip="Predicted win percentage based on model simulations">Win %</th>
                    <th data-key="p_top10_%" data-tooltip="Predicted top-10 finish percentage based on model simulations">Top-10 %</th>
                    <th data-key="p_mc_%" data-tooltip="Predicted make cut percentage based on model simulations">Make Cut %</th>
                    <th data-key="course_fit_score" data-tooltip="Course fit score: a model-based metric measuring how well the player's skills match the course characteristics (e.g., par, length, hazards)">Course Fit</th>
                    <th data-key="r1_teetime" data-tooltip="Round 1 tee time; * indicates teeing off from 10th hole">R1 Tee</th>
                    <th data-key="r2_teetime" data-tooltip="Round 2 tee time; * indicates teeing off from 10th hole">R2 Tee</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="stack">
        <div class="card">
            <div><strong>Weather (mph, %)</strong></div>
            <div id="wxList" class="small" style="line-height:1.5;"></div>
        </div>

        <div class="card" id="tournamentCard">
            <div><strong>Tournament</strong></div>
            <div id="tournament" class="small" style="line-height:1.5;"></div>
        </div>

        <div class="card">
            <div><strong>Resources</strong></div>
            <ul id="resources" class="small" style="margin:0.3rem 0 0 1rem;"></ul>
        </div>
    </div>
</div>

<script>
    // Formatting helpers
    const fmtPct = (x) => x != null ? Number(x).toFixed(2) : "";
    const fmtNum = (x, d=2) => x != null ? Number(x).toFixed(d) : "";
    const LOCAL_TZ = (() => {
      try { return Intl.DateTimeFormat().resolvedOptions().timeZone || ""; }
      catch { return ""; }
    })();
    const MONTH_LOOKUP = {
      jan: "01", feb: "02", mar: "03", apr: "04", may: "05", jun: "06",
      jul: "07", aug: "08", sep: "09", oct: "10", nov: "11", dec: "12",
    };

    function normalizeTimestamp(raw){
      if (!raw || typeof raw !== "string") return null;
      const trimmed = raw.trim();
      if (!trimmed) return null;
      if (/T/.test(trimmed) && /(?:Z|[+-]\d{2}:?\d{2})$/.test(trimmed)) return trimmed;
      if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}(?:\.\d+)? ?UTC$/i.test(trimmed)) {
        return trimmed.replace(/\s*UTC$/i, "Z").replace(" ", "T");
      }
      if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(trimmed)) {
        return `${trimmed.replace(" ", "T")}Z`;
      }
      const m = trimmed.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4}) (\d{2}):(\d{2})(?::(\d{2}))?/);
      if (m) {
        const [, day, mon, year, hh, mm, ss] = m;
        const month = MONTH_LOOKUP[mon.toLowerCase()] || null;
        if (month) {
          const safeDay = day.padStart(2, "0");
          return `${year}-${month}-${safeDay}T${hh}:${mm}:${ss ?? "00"}Z`;
        }
      }
      return trimmed;
    }

    function formatGeneratedTimestamp(raw){
      if (!raw) return "";
      const normalized = normalizeTimestamp(raw);
      const date = normalized ? new Date(normalized) : new Date(raw);
      if (!(date instanceof Date) || Number.isNaN(date.valueOf())) return raw;
      const formatted = date.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" });
      return LOCAL_TZ ? `${formatted} (${LOCAL_TZ})` : formatted;
    }

    // Helpers to detect 1st/10th tee starts from various possible fields in leaderboard.json
    const is10 = (x) => x === 10 || x === "10" || (typeof x === "string" && /\b10\b/.test(x));
    const is1  = (x) => x === 1  || x === "1"  || (typeof x === "string" && /\b1\b(?!\d)/.test(x));
    const isBackSide = (x) =>
      typeof x === "string" && /^b(ack)?$/i.test(x); // if your data uses "front"/"back"
    const isFrontSide = (x) =>
      typeof x === "string" && /^f(ront)?$/i.test(x);

    // JSON loader
    async function loadJSON(path){
      const r = await fetch(path, {cache: "no-store"});
      if (!r.ok) throw new Error(`${path}: ${r.status}`);
      return r.json();
    }

    async function safeLoadJSON(path, fallback = null){
      if (!path) return fallback;
      try { return await loadJSON(path); }
      catch (err) {
        console.warn("Failed to load", path, err);
        return fallback;
      }
    }

    // Table rendering
    let data = [];
    let sortKey = "rank";
    let sortAsc = true;

    function renderTable(rows) {
      const tbody = document.querySelector("#tbl tbody");
      tbody.innerHTML = "";
      for (const r of rows) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="num">${r.rank ?? ""}</td>
          <td>${r.player_name ?? ""}</td>
          <td class="num">${fmtPct(r["p_win_%"])}</td>
          <td class="num">${fmtPct(r["p_top10_%"])}</td>
          <td class="num">${fmtPct(r["p_mc_%"])}</td>
          <td class="num">${fmtNum(r.course_fit_score)}</td>
          <td>${r.r1_teetime ?? ""}${r.r1_from_10th ? "<sup>*</sup>" : ""}</td>
          <td>${r.r2_teetime ?? ""}${r.r2_from_10th ? "<sup>*</sup>" : ""}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    function sortRows(rows, key, asc=true) {
      const k = key;
      const f = (v) => (v == null ? "" : v);
      const sorted = [...rows].sort((a,b) => {
        const A = f(a[k]), B = f(b[k]);
        const nA = Number(A), nB = Number(B);
        if (!Number.isNaN(nA) && !Number.isNaN(nB)) {
          return asc ? nA - nB : nB - nA;
        }
        const cmp = String(A).localeCompare(String(B));
        return asc ? cmp : -cmp;
      });
      return sorted;
    }

    function applyFilter(){
      const q = document.getElementById("filterBox").value.trim().toLowerCase();
      let rows = data;
      if (q) rows = data.filter(r => String(r.player_name ?? "").toLowerCase().includes(q));
      rows = sortRows(rows, sortKey, sortAsc);
      renderTable(rows);
    }

    function attachSortHandlers(){
      const tooltip = document.getElementById("tooltip");

      document.querySelectorAll("#tbl thead th").forEach(th => {
        th.addEventListener("click", () => {
          const key = th.dataset.key;
          if (!key) return;
          if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = true; }
          applyFilter();
        });

        th.addEventListener("mouseover", (e) => {
          const desc = th.getAttribute("data-tooltip");
          if (desc) {
            tooltip.textContent = desc;
            tooltip.classList.add("show");
            tooltip.style.left = e.pageX + "px";
            tooltip.style.top = e.pageY + "px";
          }
        });

        th.addEventListener("mousemove", (e) => {
          if (tooltip.classList.contains("show")) {
            tooltip.style.left = e.pageX + "px";
            tooltip.style.top = e.pageY + "px";
          }
        });

        th.addEventListener("mouseout", () => {
          tooltip.classList.remove("show");
        });
      });

      document.getElementById("filterBox").addEventListener("input", applyFilter);
    }

    // Sidebar helpers
    function link(text, href){
      const a = document.createElement("a");
      a.textContent = text; a.href = href; a.target = "_blank"; a.rel = "noopener";
      const el = document.createElement("li"); el.appendChild(a); return el;
    }

    const weatherSeverityClass = (value, warnThreshold, alertThreshold, opts = {}) => {
      if (value == null) return "";
      const abs = opts.absolute ? Math.abs(Number(value)) : Number(value);
      if (!Number.isFinite(abs)) return "";
      if (abs >= alertThreshold) return "weather-severity--alert";
      if (abs >= warnThreshold) return "weather-severity--warn";
      return "weather-severity--calm";
    };

    const formatTempC = (temp) => temp != null ? `${fmtNum(temp, 1)}°C` : "—";
    const formatRainPct = (val) => val != null ? `${fmtNum(val, 0)}%` : "—";
    const formatDeltaStrokes = (delta) => {
      if (delta == null) return "—";
      const n = Number(delta);
      if (!Number.isFinite(n)) return "—";
      const sign = n > 0 ? "+" : n < 0 ? "−" : "±";
      return `${sign}${fmtNum(Math.abs(n), 2)} strokes`;
    };
    const hasStormRisk = (entry) => entry && entry.weathercode != null && entry.weathercode >= 95 && entry.weathercode <= 99;

    const buildWeatherPill = (icon, text, severity) => {
      const pill = document.createElement("span");
      pill.className = `weather-pill${severity ? ` ${severity}` : ""}`;
      const iconEl = document.createElement("span");
      iconEl.className = "weather-pill__icon";
      iconEl.textContent = icon;
      const textEl = document.createElement("span");
      textEl.textContent = text;
      pill.append(iconEl, textEl);
      return pill;
    };

    const buildWeatherStat = (icon, label, value, severity) => {
      const row = document.createElement("div");
      row.className = `weather-stat${severity ? ` ${severity}` : ""}`;
      const iconEl = document.createElement("span");
      iconEl.className = "weather-stat__icon";
      iconEl.textContent = icon;
      const labelEl = document.createElement("span");
      labelEl.className = "weather-stat__label";
      labelEl.textContent = label;
      const valueEl = document.createElement("span");
      valueEl.className = "weather-stat__value";
      valueEl.textContent = value;
      row.append(iconEl, labelEl, valueEl);
      return row;
    };

    const gatherWeatherSources = (neutral, waves) => {
      const sources = [];
      if (neutral) sources.push(neutral);
      if (waves?.AM) sources.push(waves.AM);
      if (waves?.PM) sources.push(waves.PM);
      return sources;
    };

    const collectConditionHighlights = (roundNumber, neutral, waves) => {
      const notes = [];
      const sources = gatherWeatherSources(neutral, waves);
      if (!sources.length) return notes;

      const numericMax = (field, transform = (x) => x) => {
        const vals = sources
          .map((s) => Number(s?.[field]))
          .filter((v) => Number.isFinite(v))
          .map(transform);
        if (!vals.length) return null;
        return Math.max(...vals);
      };

      const maxGust = numericMax("gust_mph");
      if (maxGust != null) {
        if (maxGust >= 28) {
          notes.push(`Gusts could surge to about ${fmtNum(maxGust, 1)} mph, raising suspension risks and demanding knock-down shots.`);
        } else if (maxGust >= 22) {
          notes.push(`Expect gusty spells up to ${fmtNum(maxGust, 1)} mph — ball flight control will matter.`);
        }
      }

      const maxWind = numericMax("wind_mph");
      if (maxWind != null && maxWind >= 18 && (!maxGust || maxGust < 22)) {
        notes.push(`Steady winds near ${fmtNum(maxWind, 1)} mph may force conservative lines off the tee.`);
      }

      const maxRain = numericMax("precip_pct");
      if (maxRain != null) {
        if (maxRain >= 60) {
          notes.push(`Heavy rain threat (~${fmtNum(maxRain, 0)}%) could soften fairways and slow the pace of play.`);
        } else if (maxRain >= 35) {
          notes.push(`Passing showers (~${fmtNum(maxRain, 0)}% chance) remain in the mix; short-game touch becomes critical.`);
        }
      }

      const stormy = sources.some(hasStormRisk);
      if (stormy) {
        notes.unshift("Strong electrical storm risk — lightning delays are a real possibility.");
      }

      const maxPenalty = numericMax("delta_strokes", (v) => Math.abs(v));
      if (maxPenalty != null && maxPenalty >= 0.45) {
        notes.push(`Weather-adjusted scoring could swing by roughly ±${fmtNum(maxPenalty, 2)} strokes in the harshest window.`);
      }

      if (waves?.AM && waves?.PM) {
        const deltaAM = Number(waves.AM.delta_strokes);
        const deltaPM = Number(waves.PM.delta_strokes);
        if (Number.isFinite(deltaAM) && Number.isFinite(deltaPM)) {
          const diff = deltaAM - deltaPM;
          if (Math.abs(diff) >= 0.25) {
            const advantaged = diff < 0 ? "AM" : "PM";
            notes.push(`${advantaged} starters enjoy the better side of the draw by about ${fmtNum(Math.abs(diff), 2)} strokes.`);
          }
        }
      }

      return notes;
    };

    const mergeWaveData = (am, pm) => {
      if (am && pm) {
        const acc = {};
        ["wind_mph", "gust_mph", "temp_c", "precip_pct", "delta_strokes"].forEach(key => {
          const vals = [am[key], pm[key]].map(Number).filter(v => Number.isFinite(v));
          if (vals.length) acc[key] = vals.reduce((a, b) => a + b, 0) / vals.length;
        });
        acc.weathercode = hasStormRisk(am) || hasStormRisk(pm) ? 95 : (am.weathercode ?? pm.weathercode ?? null);
        return acc;
      }
      return am || pm || null;
    };

    const buildAlertBanner = (message) => {
      const banner = document.createElement("div");
      banner.className = "weather-alert-banner";
      const icon = document.createElement("span");
      icon.className = "weather-alert-banner__icon";
      icon.textContent = "⚠️";
      const text = document.createElement("span");
      text.textContent = message;
      banner.append(icon, text);
      return banner;
    };

    const buildWaveBlock = (label, data) => {
      const wrap = document.createElement("div");
      wrap.className = "weather-wave";
      const heading = document.createElement("div");
      heading.className = "weather-wave__label";
      heading.textContent = label;
      wrap.appendChild(heading);

      if (!data) {
        const empty = document.createElement("div");
        empty.className = "weather-muted";
        empty.textContent = "No data";
        wrap.appendChild(empty);
        return wrap;
      }

      const stats = document.createElement("div");
      stats.className = "weather-stats";
      stats.appendChild(buildWeatherStat("🌬️", "Wind", `${fmtNum(data.wind_mph, 1)} mph`, weatherSeverityClass(data.wind_mph, 12, 18)));
      stats.appendChild(buildWeatherStat("💨", "Gust", `${fmtNum(data.gust_mph, 1)} mph`, weatherSeverityClass(data.gust_mph, 20, 28)));
      stats.appendChild(buildWeatherStat("🌧️", "Rain", formatRainPct(data.precip_pct), weatherSeverityClass(data.precip_pct, 35, 60)));
      stats.appendChild(buildWeatherStat("🌡️", "Temp", formatTempC(data.temp_c), ""));
      stats.appendChild(buildWeatherStat("⛳", "Δ Strokes", formatDeltaStrokes(data.delta_strokes), weatherSeverityClass(data.delta_strokes, 0.2, 0.5, { absolute: true })));
      wrap.appendChild(stats);

      if (hasStormRisk(data)) {
        wrap.appendChild(buildAlertBanner("Thunderstorm risk for this wave"));
      }

      return wrap;
    };

    const buildWeatherCard = (roundNumber, neutral, waves) => {
      const card = document.createElement("article");
      card.className = "weather-card";

      const header = document.createElement("div");
      header.className = "weather-card__header";

      const title = document.createElement("div");
      title.className = "weather-card__title";
      title.textContent = `Round ${roundNumber}`;
      header.appendChild(title);

      const summary = document.createElement("div");
      summary.className = "weather-card__summary";
      const base = neutral || mergeWaveData(waves.AM, waves.PM);

      if (base) {
        summary.appendChild(buildWeatherPill("🌬️", `${fmtNum(base.wind_mph, 1)} mph wind`, weatherSeverityClass(base.wind_mph, 12, 18)));
        summary.appendChild(buildWeatherPill("💨", `${fmtNum(base.gust_mph, 1)} mph gusts`, weatherSeverityClass(base.gust_mph, 20, 28)));
        summary.appendChild(buildWeatherPill("🌧️", formatRainPct(base.precip_pct), weatherSeverityClass(base.precip_pct, 35, 60)));
        summary.appendChild(buildWeatherPill("🌡️", formatTempC(base.temp_c), ""));
      } else {
        const placeholder = document.createElement("span");
        placeholder.className = "weather-muted";
        placeholder.textContent = "No weather forecast";
        summary.appendChild(placeholder);
      }

      header.appendChild(summary);
      card.appendChild(header);

      const stormy = hasStormRisk(neutral) || hasStormRisk(waves.AM) || hasStormRisk(waves.PM);
      if (stormy) {
        card.appendChild(buildAlertBanner("Thunderstorm threat flagged in forecast"));
      }

      const highlights = collectConditionHighlights(roundNumber, neutral, waves);
      if (highlights.length) {
        const noteList = document.createElement("ul");
        noteList.className = "weather-notes";
        highlights.forEach((text) => {
          const li = document.createElement("li");
          li.textContent = text;
          noteList.appendChild(li);
        });
        card.appendChild(noteList);
      }

      const body = document.createElement("div");
      body.className = "weather-card__body";

      if (neutral) {
        const neutralGroup = document.createElement("div");
        neutralGroup.className = "weather-group";
        const groupTitle = document.createElement("div");
        groupTitle.className = "weather-group__title";
        groupTitle.textContent = "Neutral Forecast";
        neutralGroup.appendChild(groupTitle);

        const stats = document.createElement("div");
        stats.className = "weather-stats";
        stats.appendChild(buildWeatherStat("🌬️", "Wind", `${fmtNum(neutral.wind_mph, 1)} mph`, weatherSeverityClass(neutral.wind_mph, 12, 18)));
        stats.appendChild(buildWeatherStat("💨", "Gust", `${fmtNum(neutral.gust_mph, 1)} mph`, weatherSeverityClass(neutral.gust_mph, 20, 28)));
        stats.appendChild(buildWeatherStat("🌧️", "Rain", formatRainPct(neutral.precip_pct), weatherSeverityClass(neutral.precip_pct, 35, 60)));
        stats.appendChild(buildWeatherStat("🌡️", "Temp", formatTempC(neutral.temp_c), ""));
        stats.appendChild(buildWeatherStat("⛳", "Δ Strokes", formatDeltaStrokes(neutral.delta_strokes), weatherSeverityClass(neutral.delta_strokes, 0.2, 0.5, { absolute: true })));
        neutralGroup.appendChild(stats);

        body.appendChild(neutralGroup);
      }

      if (waves.AM || waves.PM) {
        const waveGroup = document.createElement("div");
        waveGroup.className = "weather-group";
        const groupTitle = document.createElement("div");
        groupTitle.className = "weather-group__title";
        groupTitle.textContent = "Wave Splits";
        waveGroup.appendChild(groupTitle);

        const waveGrid = document.createElement("div");
        waveGrid.className = "weather-wave-grid";
        waveGrid.appendChild(buildWaveBlock("AM", waves.AM));
        waveGrid.appendChild(buildWaveBlock("PM", waves.PM));
        waveGroup.appendChild(waveGrid);

        body.appendChild(waveGroup);
      }

      if (!neutral && !waves.AM && !waves.PM) {
        const empty = document.createElement("div");
        empty.className = "weather-muted";
        empty.textContent = "No weather data for this round.";
        body.appendChild(empty);
      }

      card.appendChild(body);
      return card;
    };

    async function renderSidebar(meta){
      const wxList = document.getElementById("wxList");
      if (!wxList) return;
      wxList.innerHTML = "";
      wxList.classList.remove("weather-grid");

      const resources = meta?.resources || {};
      const neutralPath = resources.weather_round_neutral || "euro/weather_round_neutral.json";
      const wavePath = resources.weather_round_wave || "euro/weather_round_wave.json";

      const [neutralRaw, waveRaw] = await Promise.all([
        safeLoadJSON(neutralPath, []),
        safeLoadJSON(wavePath, []),
      ]);
      const wn = Array.isArray(neutralRaw) ? neutralRaw : [];
      const ww = Array.isArray(waveRaw) ? waveRaw : [];

      const byRound = {};
      ww.forEach(entry => {
        if (!entry) return;
        const round = Number(entry.round);
        if (!Number.isFinite(round)) return;
        const waveKey = typeof entry.wave === "string" ? entry.wave.trim().toUpperCase() : "";
        if (!waveKey) return;
        if (!byRound[round]) byRound[round] = {};
        byRound[round][waveKey] = entry;
      });

      let hasAny = false;
      [1, 2, 3, 4].forEach(roundNumber => {
        const neutral = wn.find(x => Number(x.round) === roundNumber) || null;
        const wavesForRound = byRound[roundNumber] || {};
        const waves = {
          AM: wavesForRound.AM || null,
          PM: wavesForRound.PM || null,
        };
        if (neutral || waves.AM || waves.PM) {
          wxList.appendChild(buildWeatherCard(roundNumber, neutral, waves));
          hasAny = true;
        }
      });

      if (hasAny) {
        wxList.classList.add("weather-grid");
      } else {
        wxList.innerHTML = "<div class='weather-muted'>No weather data available.</div>";
      }

      const ul = document.getElementById("resources");
      if (!ul) return;
      ul.innerHTML = "";
      if (resources.downloads_csv) ul.appendChild(link("Leaderboard CSV", resources.downloads_csv));
      if (resources.downloads_html) ul.appendChild(link("Leaderboard HTML", resources.downloads_html));
      if (resources.weather_meta) ul.appendChild(link("Weather meta (JSON)", resources.weather_meta));
      if (meta?.lat != null && meta?.lon != null) {
        ul.appendChild(link("Open course in Maps", `https://www.google.com/maps?q=${meta.lat},${meta.lon}`));
      }
      if (resources.weather_round_neutral) ul.appendChild(link("Neutral weather (JSON)", resources.weather_round_neutral));
      if (resources.weather_round_wave) ul.appendChild(link("Wave-aware weather (JSON)", resources.weather_round_wave));
      if (resources.course_fit_weights) ul.appendChild(link("Course-fit weights (DIY, JSON)", resources.course_fit_weights));
      if (resources.course_history_summary) ul.appendChild(link("Course-history summary (JSON)", resources.course_history_summary));
      if (resources.tournament_summary) ul.appendChild(link("Tournament summary (JSON)", resources.tournament_summary));
      ul.appendChild(link("2026 Schedule", "euro_schedule.html"));
    }

    // Tournament summary
    async function renderTournament() {
      const el = document.getElementById("tournament");
      if (!el) return;
      let t = null;
      try { t = await loadJSON("euro/tournament_summary.json"); } catch {}
      if (!t) { el.textContent = "No summary."; return; }

    const lines = [];
    if (t.event_name) lines.push(`Event: ${t.event_name}`);
    if (t.course) lines.push(`Course: ${t.course}`);
    if (t.total_yardage != null) lines.push(`Total yardage: ${Number(t.total_yardage).toLocaleString()}`);
    if (t.course_location) lines.push(`Location: ${t.course_location}`);
    if (t.start_date) lines.push(`Start date: ${t.start_date}`);
    if (t.field_size != null) lines.push(`Field size: ${t.field_size}`);

    if (Array.isArray(t.previous_winners) && t.previous_winners.length) {
        const top = t.previous_winners.slice(0, 5);
        const list = top.map(w => {
            let winnerName = w.winner;
            if (winnerName.includes(',')) {
                const parts = winnerName.split(', ');
                if (parts.length === 2) {
                    winnerName = `${parts[1]} ${parts[0]}`;
                }
            }
            return `• ${w.year}: ${winnerName}${w.score ? ` (${w.score})` : ""}`;
        }).join("<br/>");
        lines.push(`<div style="margin-top:0.25rem;"><strong>Previous winners</strong><br/>${list}</div>`);
    }
    el.innerHTML = lines.join("<br/>");
    }

    // Main
    async function main(){
      const meta = await loadJSON("euro/meta.json");
      const rows = await loadJSON("euro/leaderboard.json");

      // Extract year from meta.r1_date
      let year = '';
      if (meta.r1_date) {
        year = meta.r1_date.split('-')[0];
        console.log("Year from meta.r1_date:", year);
      }

      const subtitle = year ? `${year} - ${meta.event_name || ''}` : meta.event_name || '';
      document.getElementById("subtitle").textContent = subtitle;
      const generatedEl = document.getElementById("generatedAt");
      if (generatedEl) {
        const generatedRaw = meta.generated_utc ?? meta.saved_at_utc ?? meta.last_updated ?? null;
        const formatted = generatedRaw ? formatGeneratedTimestamp(generatedRaw) : "";
        if (formatted) {
          generatedEl.textContent = `Predictions updated ${formatted}`;
          generatedEl.style.display = "block";
        } else {
          generatedEl.textContent = "";
          generatedEl.style.display = "none";
        }
      }

      // Downloads
      const dlCsv  = document.getElementById("dlCsv");
      const dlHtml = document.getElementById("dlHtml");
      dlCsv.href   = meta.resources?.downloads_csv ?? "#";
      if (meta.resources?.downloads_html){ dlHtml.href = meta.resources.downloads_html; dlHtml.style.display="inline"; }

      data = rows.map((r, idx) => {
        // Detect explicit sides for each round (tri-state: true/false/undefined)
        const r1_is10 = r.r1_from_10th === true ||
                        is10(r.r1_start_hole) || is10(r.r1_start) || is10(r.r1_tee) ||
                        isBackSide(r.r1_side);
        const r1_is1  = r.r1_from_1st === true ||
                        is1(r.r1_start_hole) || is1(r.r1_start) || is1(r.r1_tee) ||
                        isFrontSide(r.r1_side);
        let r1_from_10th = r1_is10 ? true : (r1_is1 ? false : undefined);

        const r2_is10 = r.r2_from_10th === true ||
                        is10(r.r2_start_hole) || is10(r.r2_start) || is10(r.r2_tee) ||
                        isBackSide(r.r2_side);
        const r2_is1  = r.r2_from_1st === true ||
                        is1(r.r2_start_hole) || is1(r.r2_start) || is1(r.r2_tee) ||
                        isFrontSide(r.r2_side);
        let r2_from_10th = r2_is10 ? true : (r2_is1 ? false : undefined);

        // Enforce alternation between R1 and R2:
        // - If one round's side is known, the other is the opposite.
        // - If both are known but equal, flip R1 to be opposite of R2.
        if (r1_from_10th === undefined && r2_from_10th !== undefined) {
          r1_from_10th = !r2_from_10th;
        } else if (r2_from_10th === undefined && r1_from_10th !== undefined) {
          r2_from_10th = !r1_from_10th;
        } else if (r1_from_10th !== undefined && r2_from_10th !== undefined && r1_from_10th === r2_from_10th) {
          // Contradiction (both same). Prefer R2 and flip R1.
          r1_from_10th = !r2_from_10th;
        }

        // Default to false if still unknown (no asterisk shown)
        r1_from_10th = !!r1_from_10th;
        r2_from_10th = !!r2_from_10th;

        return {
          rank: r.rank ?? (idx+1),
          player_name: r.player_name ?? r["Player"] ?? "",
          "p_win_%": r["p_win_%"] ?? r.p_win_ ?? "",
          "p_top10_%": r["p_top10_%"] ?? r.p_top10_ ?? "",
          "p_mc_%": r["p_mc_%"] ?? r.p_mc_ ?? "",
          course_fit_score: r.course_fit_score ?? "",
          r1_teetime: r.r1_teetime ?? "",
          r2_teetime: r.r2_teetime ?? "",
          // flags used by renderTable to append the asterisk
          r1_from_10th,
          r2_from_10th,
        };
      });

      attachSortHandlers();
      renderTable(sortRows(data, "rank", true));
      await renderSidebar(meta);
      await renderTournament();
    }

    // Kick off
    main().catch(err => {
      document.body.innerHTML = `<pre style="color:#b00">${err}</pre>`;
      console.error(err);
    });

    // Load menu HTML
    fetch('menu.html?v=20260417').then(response => response.text()).then(html => document.getElementById('menu').innerHTML = html);
</script>
