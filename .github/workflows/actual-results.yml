name: Fetch actual results

on:
  schedule:
    # Runs once a day at 02:17 UTC.
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Season/archive year to refresh. Defaults to the current UTC year."
        type: string
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-actual-results:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
      YEAR: ${{ inputs.year || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Fetch actual results
        run: bash scripts/ci_fetch_actual_results.sh

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload web artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
