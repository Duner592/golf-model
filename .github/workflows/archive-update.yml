name: Update previous-week archives

on:
  schedule:
    # GitHub cron is UTC. Runs Monday at 12:00 and 21:00 UTC.
    - cron: "0 12,21 * * 1"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional reference date in YYYY-MM-DD format. Previous week is calculated from this date."
        type: string
        required: false
      dry_run:
        description: "List previous-week event IDs without updating archives."
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: archive-update
  cancel-in-progress: false

jobs:
  update-archives:
    runs-on: ubuntu-latest
    env:
      DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
      REFERENCE_DATE: ${{ inputs.date || '' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Update previous-week archives
        run: |
          python scripts/update_upcoming_events.py
          args=()
          if [ -n "$REFERENCE_DATE" ]; then
            args+=(--date "$REFERENCE_DATE")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          python scripts/update_previous_week_archives.py "${args[@]}"

      - name: Refresh actual results and accuracy
        if: ${{ env.DRY_RUN != 'true' }}
        run: |
          python scripts/fetch_actual_results.py --allow-missing
          python scripts/build_prediction_accuracy.py

      - name: Commit archive updates
        if: ${{ env.DRY_RUN != 'true' }}
        run: |
          changes="$(git status --porcelain --untracked-files=all -- upcoming-events.json web/archive data/analytics)"
          if [ -z "$changes" ]; then
            echo "No previous-week archive changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upcoming-events.json web/archive data/analytics
          git commit -m "Update previous-week archives"
          git pull --rebase --autostash origin master
          git push
