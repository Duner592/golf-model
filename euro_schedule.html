<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2026 DP World Tour Schedule</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="menu.css">
    <script src="menu.js"></script>
    <style>
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            margin: 2rem;
            color: #111;
            transition: padding-left 0.3s;
            display: flex;
            flex-direction: column;
        }

        /* Logo (same as index) */
        .logo {
            position: absolute;
            top: 8px;
            right: 16px;
            height: 80px;
            width: auto;
            z-index: 1002;
        }

        /* Table area */
        .table-container { overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; width: auto; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; white-space: nowrap; }
        th { background-color: #f2f2f2; }

        /* Link button (same as index) */
        .link { display: inline-block; margin: 0.25rem 0; padding: 0.25rem 0.5rem; background: #007bff; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9rem; }
        .link:hover { background: #0056b3; }

        @media (max-width: 768px) {
            body { padding-top: 70px; }
            .logo { height: 60px; top: 5px; right: 5px; }

            /* Column min-widths + wrap for Event and Course so they're not tiny, but can wrap */
            th:nth-child(1), td:nth-child(1) { min-width: 100px; }   /* Date */
            th:nth-child(2), td:nth-child(2) {                       /* Event */
                min-width: 210px;
                white-space: normal;
                overflow-wrap: anywhere;
                word-break: break-word;
                line-height: 1.3;
            }
            th:nth-child(3), td:nth-child(3) {                       /* Course */
                min-width: 170px;
                white-space: normal;
                overflow-wrap: anywhere;
                word-break: break-word;
                line-height: 1.3;
            }
            th:nth-child(4), td:nth-child(4) { min-width: 220px; }   /* Location */
        }
    </style>
</head>
<body>
<div class="logo-wrapper">
    <img src="EdsGolfModelLogo.png" alt="Eds Golf Model Logo" class="logo">
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- Same placement as index.html -->
<div class="menu-container">
    <button class="hamburger" onclick="toggleMenu()">☰ Menu</button>
</div>

<h1>2026 DP World Tour Schedule</h1>
<div class="table-container">
    <table id="schedule-table">
        <thead>
        <tr>
            <th>Date</th>
            <th>Event</th>
            <th>Course</th>
            <th>Location</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="menu" id="menu"></div>

<script>
    // Data load
    const tbody = document.querySelector('#schedule-table tbody');
    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Loading schedule...</td></tr>';

    fetch('euro/schedule.json')
        .then(response => {
            if (!response.ok) throw new Error('Failed to load schedule data');
            return response.json();
        })
        .then(data => {
            tbody.innerHTML = '';
            if (!data || !data.length) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No events found.</td></tr>';
                return;
            }
            data.forEach(event => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${event.date || 'N/A'}</td><td>${event.event || 'N/A'}</td><td>${event.course || 'N/A'}</td><td>${event.location || 'N/A'}</td>`;
                tbody.appendChild(row);
            });
        })
        .catch(() => {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: red;">Error loading schedule. Please try again later.</td></tr>';
        });

    // Load menu HTML
    fetch('menu.html').then(response => response.text()).then(html => document.getElementById('menu').innerHTML = html);
</script>
</body>
</html>
