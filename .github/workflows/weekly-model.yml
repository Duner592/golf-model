name: Scheduled model run

on:
  schedule:
    # Runs every 2 hours on Monday, Tuesday, and Wednesday.
    # Avoiding minute 0 reduces the chance of queue delays on GitHub-hosted runners.
    - cron: "23 */2 * * 1-3"
  workflow_dispatch:
    inputs:
      tour:
        description: "Tour to process. Use pga/euro when event_id is set."
        type: choice
        required: true
        default: both
        options:
          - both
          - pga
          - euro
      event_id:
        description: "Optional pinned event ID. Leave blank for current-week schedule resolution."
        type: string
        required: false
      fast:
        description: "Skip slower course/history and HTML leaderboard steps."
        type: boolean
        required: false
        default: false
      top_n:
        description: "Leaderboard size passed to export_leaderboard.py."
        type: string
        required: false
        default: "20"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run-model:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
      TOUR: ${{ inputs.tour || 'both' }}
      EVENT_ID: ${{ inputs.event_id || '' }}
      FAST: ${{ inputs.fast || 'false' }}
      TOP_N: ${{ inputs.top_n || '20' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run model pipeline
        run: bash scripts/ci_run_model.sh

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload web artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
